stages:
  - lint
  - test
  - build
  - plan
  - deploy

variables:
  TF_DIR: terraform
  PYTHON_VERSION: "3.12"
  TF_STATE_BUCKET: "phishing-terraform-state"
  TF_STATE_KEY: "prod/terraform.tfstate"
  TF_STATE_LOCK_TABLE: "phishing-terraform-locks"

# ─── Stage 1: Lint ────────────────────────────────────────────────────────────

lint:
  stage: lint
  image: python:3.12-slim
  script:
    - apt-get update && apt-get install -y make
    - pip install flake8
    - make lint

# ─── Stage 2: Test ────────────────────────────────────────────────────────────

test:
  stage: test
  image: python:3.12-slim
  script:
    - apt-get update && apt-get install -y make
    - pip install -r requirements.txt
    - pip install pytest moto
    - make test
  artifacts:
    when: always
    reports:
      junit: report.xml

# ─── Stage 3: Build Lambda package ───────────────────────────────────────────

build:
  stage: build
  image: python:3.12-slim
  script:
    - apt-get update && apt-get install -y zip
    - chmod +x ./scripts/build_lambda.sh
    - ./scripts/build_lambda.sh
  artifacts:
    paths:
      - lambda.zip
    expire_in: 1 day

# ─── Stage 4: Terraform Plan ─────────────────────────────────────────────────

plan:
  stage: plan
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - cd $TF_DIR
    - terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${TF_STATE_KEY}" -backend-config="region=${AWS_DEFAULT_REGION}" -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}"
    - terraform validate
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - terraform/tfplan
      - terraform/.terraform
      - terraform/.terraform.lock.hcl
    expire_in: 1 day
  dependencies:
    - build

# ─── Stage 5: Deploy (manual approval for prod) ─────────────────────────────

deploy:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache aws-cli
  script:
    - cd $TF_DIR
    - terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${TF_STATE_KEY}" -backend-config="region=${AWS_DEFAULT_REGION}" -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}"
    - terraform apply -auto-approve tfplan
    # Upload EML samples to S3
    - aws s3 sync ../examples/ s3://${S3_BUCKET}/eml-samples/ --exclude "*" --include "*.eml"
  when: manual
  only:
    - main
  dependencies:
    - build
    - plan

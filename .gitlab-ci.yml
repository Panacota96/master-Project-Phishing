stages:
  - lint
  - test
  - build
  - plan
  - deploy

variables:
  TF_DIR: terraform
  PYTHON_VERSION: "3.12"
  TF_ENV: "dev"
  TF_BACKEND_FILE: "backend/${TF_ENV}.hcl"
  TF_VAR_FILE: "env/${TF_ENV}.tfvars"

# ─── Stage 1: Lint ────────────────────────────────────────────────────────────

lint:
  stage: lint
  image: python:3.12-slim
  script:
    - apt-get update && apt-get install -y make
    - pip install flake8
    - make lint

# ─── Stage 2: Test ────────────────────────────────────────────────────────────

test:
  stage: test
  image: python:3.12-slim
  script:
    - apt-get update && apt-get install -y make
    - pip install -r requirements.txt
    - pip install pytest moto
    - make test
  artifacts:
    when: always
    reports:
      junit: report.xml

# ─── Stage 3: Build Lambda package ───────────────────────────────────────────

build:
  stage: build
  image: python:3.12-slim
  script:
    - apt-get update && apt-get install -y zip
    - bash ./scripts/build_lambda.sh
  artifacts:
    paths:
      - lambda.zip
    expire_in: 1 day

# ─── Stage 4: Terraform Plan ─────────────────────────────────────────────────

plan:
  stage: plan
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - cd $TF_DIR
    - terraform init -backend-config="${TF_BACKEND_FILE}"
    - |
      if [ ! -f "${TF_VAR_FILE}" ]; then
        APP_NAME="${TF_VAR_app_name:-phishing-app}"
        cat > "${TF_VAR_FILE}" <<EOF
      aws_region  = "${AWS_DEFAULT_REGION}"
      environment = "${TF_ENV}"
      app_name    = "${APP_NAME}"
      secret_key  = "${TF_VAR_secret_key}"
      EOF
      fi
    - terraform validate
    - terraform plan -var-file="${TF_VAR_FILE}" -out=tfplan
  artifacts:
    paths:
      - terraform/tfplan
      - terraform/.terraform
      - terraform/.terraform.lock.hcl
    expire_in: 1 day
  dependencies:
    - build

# ─── Stage 5: Deploy (manual approval for prod) ─────────────────────────────

deploy:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache aws-cli
  script:
    - cd $TF_DIR
    - terraform init -backend-config="${TF_BACKEND_FILE}"
    - |
      if [ ! -f "${TF_VAR_FILE}" ]; then
        APP_NAME="${TF_VAR_app_name:-phishing-app}"
        cat > "${TF_VAR_FILE}" <<EOF
      aws_region  = "${AWS_DEFAULT_REGION}"
      environment = "${TF_ENV}"
      app_name    = "${APP_NAME}"
      secret_key  = "${TF_VAR_secret_key}"
      EOF
      fi
    - terraform plan -var-file="${TF_VAR_FILE}" -out=tfplan
    - terraform apply -auto-approve tfplan
    # Upload EML samples to S3
    - S3_BUCKET="$(terraform output -raw s3_bucket_name)"
    - aws s3 sync ../examples/ "s3://${S3_BUCKET}/eml-samples/" --exclude "*" --include "*.eml"
  when: manual
  only:
    - main
  dependencies:
    - build
    - plan

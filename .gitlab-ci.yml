migrate_prod:
  stage: migrate
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache aws-cli python3 py3-pip
  script:
    - cd $TF_DIR
    - TF_ENV=prod
    - TF_BACKEND_FILE="backend/${TF_ENV}.hcl"
    - terraform init -reconfigure -backend-config="${TF_BACKEND_FILE}"
    - S3_BUCKET_PROD="$(terraform output -raw s3_bucket_name)"
    - cd ..
    - export TF_VAR_app_name="${TF_VAR_app_name:-phishing-app}"
    - export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION}"
    - export DEV_ENV="dev"
    - export PROD_ENV="prod"
    - export DEV_BUCKET="${TF_VAR_app_name}-dev-${AWS_DEFAULT_REGION}"
    - export PROD_BUCKET="${S3_BUCKET_PROD}"
    - |
      if [ -z "${S3_BUCKET_PROD}" ]; then
        echo "ERROR: prod bucket output not found. Ensure deploy_prod completed."
        exit 1
      fi
    - bash scripts/migrate_s3.sh
    - pip3 install -r requirements.txt
    - |
      aws dynamodb describe-table --table-name "${TF_VAR_app_name}-prod-users" >/dev/null
      if [ "${MIGRATE_DRY_RUN:-false}" = "true" ]; then
        echo "Running DynamoDB migration in dry-run mode."
        python3 scripts/migrate_dynamodb.py --from dev --to prod --dry-run
      else
        python3 scripts/migrate_dynamodb.py --from dev --to prod
      fi
  when: manual
  only:
    - main
  dependencies:
    - deploy_prod

destroy_dev:
  stage: destroy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache aws-cli
  script:
    - cd $TF_DIR
    - TF_ENV=dev
    - TF_BACKEND_FILE="backend/${TF_ENV}.hcl"
    - TF_VAR_FILE="env/${TF_ENV}.tfvars"
    - terraform init -reconfigure -backend-config="${TF_BACKEND_FILE}"
    - |
      if [ "${CLEAN_S3:-false}" = "true" ]; then
        S3_BUCKET="$(terraform output -raw s3_bucket_name)"
        aws s3api list-object-versions --bucket "${S3_BUCKET}" \
          --query 'Versions[].{Key:Key,VersionId:VersionId}' --output json > /tmp/versions.json
        aws s3api list-object-versions --bucket "${S3_BUCKET}" \
          --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' --output json > /tmp/markers.json
        python3 - <<'PY'
          import json
          from pathlib import Path

          versions = json.loads(Path('/tmp/versions.json').read_text() or '[]')
          markers = json.loads(Path('/tmp/markers.json').read_text() or '[]')
          objects = versions + markers
          payload = {'Objects': objects} if objects else {'Objects': []}
          Path('/tmp/delete.json').write_text(json.dumps(payload))
          print(f"objects_to_delete={len(objects)}")
        PY
        aws s3api delete-objects --bucket "${S3_BUCKET}" --delete file:///tmp/delete.json
      fi
    - terraform destroy -auto-approve -var-file="${TF_VAR_FILE}"
  when: manual
  only:
    - main

destroy_prod:
  stage: destroy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache aws-cli
  script:
    - cd $TF_DIR
    - TF_ENV=prod
    - TF_BACKEND_FILE="backend/${TF_ENV}.hcl"
    - TF_VAR_FILE="env/${TF_ENV}.tfvars"
    - terraform init -reconfigure -backend-config="${TF_BACKEND_FILE}"
    - |
      if [ "${CLEAN_S3:-false}" = "true" ]; then
        S3_BUCKET="$(terraform output -raw s3_bucket_name)"
        aws s3api list-object-versions --bucket "${S3_BUCKET}" \
          --query 'Versions[].{Key:Key,VersionId:VersionId}' --output json > /tmp/versions.json
        aws s3api list-object-versions --bucket "${S3_BUCKET}" \
          --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' --output json > /tmp/markers.json
        python3 - <<'PY'
          import json
          from pathlib import Path

          versions = json.loads(Path('/tmp/versions.json').read_text() or '[]')
          markers = json.loads(Path('/tmp/markers.json').read_text() or '[]')
          objects = versions + markers
          payload = {'Objects': objects} if objects else {'Objects': []}
          Path('/tmp/delete.json').write_text(json.dumps(payload))
          print(f"objects_to_delete={len(objects)}")
        PY
        aws s3api delete-objects --bucket "${S3_BUCKET}" --delete file:///tmp/delete.json
      fi
    - terraform destroy -auto-approve -var-file="${TF_VAR_FILE}"
  when: manual
  only:
    - main

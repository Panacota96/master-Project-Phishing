name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: make lint

      - name: Install dependencies for validate-eml
        run: pip install -r requirements.txt

      - name: Validate EML realism
        run: make validate-eml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest moto

      - name: Test
        run: make test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run docs consistency checks
        run: make docs-check

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=phishing-platform-infra/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=phishing-platform-infra/terraform validate

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, docs-check, terraform-validate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build Lambda artifact
        run: make lambda

      - name: Build Registration Worker artifact
        run: make registration-worker

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-artifacts
          path: |
            lambda.zip
            registration_worker.zip

  functional-smoke:
    needs: build
    uses: ./.github/workflows/functional-smoke.yml
    with:
      mode: local
      base_url: http://127.0.0.1

name: Docs or technical debt
description: Track stale documentation, cleanup work, or follow-up engineering debt.
title: "docs/debt: "
labels:
  - documentation
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain the stale guidance, inconsistency, or debt.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Point to the exact files, links, or commands involved.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: Define the exit criteria.
    validations:
      required: true

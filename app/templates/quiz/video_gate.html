{% extends "base.html" %}
{% block title %}{{ quiz.title }} Training Video{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h3 class="card-title">{{ quiz.title }} Training Video</h3>
        <p class="text-muted">Watch the full video to unlock this quiz.</p>
        <video id="quiz-training-video" class="w-100 border rounded" controls preload="metadata">
            <source src="{{ video_url }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <div id="video-status" class="text-muted small">Complete the video to continue.</div>
            <a id="start-quiz-btn" class="btn btn-primary disabled" href="{{ url_for('quiz.start_quiz', quiz_id=quiz.quiz_id) }}" aria-disabled="true">Start Quiz</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const video = document.getElementById('quiz-training-video');
const startBtn = document.getElementById('start-quiz-btn');
const statusEl = document.getElementById('video-status');

async function markWatched() {
    const resp = await fetch('{{ url_for('quiz.video_watched', quiz_id=quiz.quiz_id) }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': window.CSRF_TOKEN,
        },
        body: JSON.stringify({ watched: true }),
    });
    if (!resp.ok) {
        let msg = 'Unable to record video completion.';
        try { msg = (await resp.json()).error || msg; } catch (_) {}
        throw new Error(msg);
    }
}

if (video) {
    video.addEventListener('ended', async () => {
        statusEl.textContent = 'Recording completion...';
        try {
            await markWatched();
            startBtn.classList.remove('disabled');
            startBtn.removeAttribute('aria-disabled');
            statusEl.textContent = 'Video complete. You can start the quiz.';
        } catch (err) {
            statusEl.textContent = `Error: ${err.message}`;
        }
    });
}
</script>
{% endblock %}

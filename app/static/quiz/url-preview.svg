<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Email snippet showing a suspicious URL">
  <rect width="900" height="420" fill="#f8fafc" />
  <rect x="40" y="40" width="820" height="340" rx="18" fill="#ffffff" stroke="#e2e8f0" />
  <text x="70" y="90" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#0f172a">Subject: Account Verification Required</text>
  <text x="70" y="130" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">From: security@paypal.com</text>
  <text x="70" y="165" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">We noticed unusual activity. Verify your account:</text>
  <rect x="70" y="190" width="700" height="46" rx="8" fill="#f1f5f9" />
  <text x="90" y="220" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0f172a">https://paypal.com.secure-login.net/verify</text>
  <text x="70" y="270" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748b">Hint: Check the actual domain after hover.</text>
</svg>

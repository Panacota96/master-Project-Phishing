<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Email snippet showing a suspicious attachment">
  <rect width="900" height="420" fill="#f8fafc" />
  <rect x="40" y="40" width="820" height="340" rx="18" fill="#ffffff" stroke="#e2e8f0" />
  <text x="70" y="90" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#0f172a">Subject: Q4 Report Attached</text>
  <text x="70" y="130" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">From: finance-team@example.com</text>
  <text x="70" y="165" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">Please review the attached report before EOD.</text>
  <rect x="70" y="200" width="420" height="56" rx="10" fill="#fee2e2" />
  <text x="90" y="235" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#991b1b">Attachment: Q4_Report.pdf.exe</text>
  <text x="70" y="285" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748b">Hint: Double extensions are a red flag.</text>
</svg>

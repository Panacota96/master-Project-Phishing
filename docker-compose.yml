services:
  dynamodb-local:
    image: amazon/dynamodb-local
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory"]
    ports:
      - "8766:8000"
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    depends_on:
      - dynamodb-local
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/usr/share/nginx/html/static:ro
    depends_on:
      - web
    restart: unless-stopped
